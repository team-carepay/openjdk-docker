on:
  push:
    branches-ignore: main

name: build

jobs:
  default:
    name: Build Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        JDK_VERSION: [nojdk, 11, 17, 21, 25]
        OS: [slim, alpine]
        AWS_CLI_VERSION: ['', 2.15.35]
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.OS }}
        load: true
        tags: openjdk:ci-test
        build-args: |
          JDK_VERSION=${{ matrix.JDK_VERSION }}
          AWS_CLI_VERSION=${{ matrix.AWS_CLI_VERSION }}
    - name: Smoke test
      run: |
        docker run --rm \
          -e JDK_VERSION="${{ matrix.JDK_VERSION }}" \
          -e AWS_CLI_VERSION="${{ matrix.AWS_CLI_VERSION }}" \
          openjdk:ci-test bash -c '
            set -e
            bash --version
            curl --version
            git --version
            jq --version
            docker --version
            kubectl version --client
            yq --version
            vacuum --version
            yamlfmt --version
            if [ "$JDK_VERSION" != "nojdk" ]; then java -version; fi
            if [ -n "$AWS_CLI_VERSION" ]; then aws --version; fi
          '
